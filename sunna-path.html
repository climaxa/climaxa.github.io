<!DOCTYPE html>
<html lang="ar" dir="rtl" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السنة النبوية | 4400 حديث</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1b4332; --accent: #2d6a4f; --bg: #f4f7f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .header h1 { font-family: 'Amiri', serif; font-size: 1.8rem; }

        .hadith-card { max-width: 800px; margin: 20px auto; width: 92%; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; position: relative; border: 1px solid #eee; }
        .hadith-text { font-family: 'Amiri', serif; font-size: 1.6rem; line-height: 1.9; color: #222; margin-bottom: 20px; }
        .hadith-meta { font-size: 0.9rem; color: #666; background: #f0f4f2; padding: 10px; border-radius: 10px; display: inline-block; }

        .error-msg { color: #ae2012; font-weight: bold; font-size: 1.2rem; padding: 20px; line-height: 1.6; display: none; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 20px 0 100px; }
        .nav-btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; min-width: 110px; }
        .nav-btn:disabled { background: #ccc; cursor: not-allowed; }
        #counter { font-weight: bold; color: var(--primary); font-size: 1.1rem; background: #fff; padding: 5px 15px; border-radius: 10px; border: 1px solid #ddd; }

        .voice-btn { background: #e8f5e9; border: none; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; margin: 10px auto; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; }

        .menu-wrapper { position: fixed; bottom: 25px; right: 25px; z-index: 4000; }
        .side-menu { background: white; width: 220px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); margin-bottom: 15px; display: none; flex-direction: column; overflow: hidden; border: 1px solid #ddd; }
        .side-menu.active { display: flex; }
        .menu-link { padding: 15px; color: #333; text-decoration: none; border-bottom: 1px solid #f0f0f0; text-align: center; font-weight: bold; cursor: pointer; }
        .menu-toggle { background: var(--primary); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 26px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        .loading { font-weight: bold; color: var(--accent); display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>موسوعة الـ 4400 حديث الصحيحة</h1>
    </div>

    <div class="hadith-card" id="main-card">
        <div id="loader" class="loading">جاري جلب الحديث من السنة...</div>
        <div id="content" class="hadith-text">جارٍ التحميل...</div>
        <button class="voice-btn" id="v-btn" onclick="speak()">🔊</button>
        <div id="meta" class="hadith-meta">--</div>
        <div id="limit-error" class="error-msg">
            لقد انتهى العدد الموجود بالموقع للاسف لا تستطيع استخدام هذه الخدمه لاحاديث اخرى يرجى زياره خدمات اخرى فهذه مشكله تقنيه بحته
        </div>
    </div>

    <div class="controls" id="control-panel">
        <button id="prev" class="nav-btn" onclick="move(-1)">السابق</button>
        <span id="counter">الحديث 1</span>
        <button id="next" class="nav-btn" onclick="move(1)">التالي</button>
    </div>

    <div class="menu-wrapper">
        <div id="sm" class="side-menu">
            <a href="index.html" class="menu-link">🏠 الرئيسية</a>
            <div class="menu-link" onclick="dl()">📥 تحميل الصفحة</div>
            <div class="menu-link" onclick="mail()">📧 تواصل معنا</div>
        </div>
        <button class="menu-toggle" onclick="tgl()">☰</button>
    </div>

    <script>
        let currentIdx = 1;
        const MAX_HADITHS = 4400;
        const storageKey = "user_hadith_pos";

        window.onload = () => {
            const saved = localStorage.getItem(storageKey);
            if (saved) currentIdx = parseInt(saved);
            loadHadith();
        };

        async function loadHadith() {
            // التحقق من الوصول للحد الأقصى
            if (currentIdx > MAX_HADITHS) {
                showError();
                return;
            }

            const content = document.getElementById('content');
            const meta = document.getElementById('meta');
            const loader = document.getElementById('loader');
            const counter = document.getElementById('counter');

            content.style.display = "none";
            loader.style.display = "block";
            counter.innerText = `الحديث ${currentIdx}`;

            try {
                // استخدام API لجلب أحاديث البخاري ومسلم بالتسلسل
                const book = currentIdx <= 2000 ? 'bukhori' : 'muslim';
                const number = currentIdx <= 2000 ? currentIdx : currentIdx - 2000;
                
                const response = await fetch(`https://hadis-api-id.vercel.app/hadith/${book}/${number}`);
                const data = await response.json();

                if (data && data.contents) {
                    content.innerText = data.contents.arabic;
                    meta.innerText = `المصدر: ${data.name} | رقم الحديث: ${data.contents.number}`;
                    content.style.display = "block";
                } else {
                    throw new Error();
                }
            } catch (e) {
                content.innerText = "حدث خطأ في جلب البيانات، يرجى المحاولة لاحقاً.";
                content.style.display = "block";
            }
            loader.style.display = "none";
            localStorage.setItem(storageKey, currentIdx);
            
            document.getElementById('prev').disabled = (currentIdx <= 1);
        }

        function move(step) {
            currentIdx += step;
            if (currentIdx > MAX_HADITHS) {
                showError();
            } else {
                loadHadith();
            }
        }

        function showError() {
            document.getElementById('content').style.display = "none";
            document.getElementById('meta').style.display = "none";
            document.getElementById('v-btn').style.display = "none";
            document.getElementById('limit-error').style.display = "block";
            document.getElementById('control-panel').style.opacity = "0.3";
            document.getElementById('next').disabled = true;
        }

        function speak() {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(document.getElementById('content').innerText);
            u.lang = 'ar-SA';
            window.speechSynthesis.speak(u);
        }

        function tgl() { document.getElementById('sm').classList.toggle('active'); }
        function dl() {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([document.documentElement.outerHTML], {type:'text/html'}));
            a.download = 'sunna-path.html'; a.click();
        }
        function mail() {
            const m = prompt("اكتب رسالتك:");
            if(m) window.location.href = `mailto:kintav@zohomail.eu?body=${m}`;
        }
    </script>
</body>
</html>
